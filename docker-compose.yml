services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # 知识文档持久化（挂载外部目录）
      - ./knowledge:/app/knowledge
      # 向量索引持久化
      - chroma_data:/app/chroma_db
    environment:
      - HF_HUB_OFFLINE=0
      - CHROMA_DB_DIR=/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma_data:
