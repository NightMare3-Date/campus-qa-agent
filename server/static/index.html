<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>校园知识问答 Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.header{background:#1e293b;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.header h1{font-size:18px;color:#38bdf8}
.header a{color:#64748b;font-size:12px;text-decoration:none}
.badge{font-size:12px;color:#94a3b8;background:#334155;padding:4px 10px;border-radius:12px;margin-left:8px}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:10px;max-width:80%;animation:fadeIn .3s}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.agent{align-self:flex-start}
.av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.av.u{background:#3b82f6}.av.a{background:#10b981}
.bbl{padding:12px 16px;border-radius:12px;line-height:1.6;font-size:14px}
.msg.user .bbl{background:#2563eb;border-bottom-right-radius:4px}
.msg.agent .bbl{background:#1e293b;border:1px solid #334155;border-bottom-left-radius:4px;white-space:pre-wrap;word-break:break-word}
.input-area{background:#1e293b;padding:16px 20px;border-top:1px solid #334155;display:flex;gap:10px}
.input-area input{flex:1;padding:10px 16px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:14px;outline:none}
.input-area input:focus{border-color:#38bdf8}
.input-area button{padding:10px 24px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:14px;cursor:pointer;font-weight:600}
.input-area button:hover{background:#1d4ed8}
.input-area button:disabled{opacity:.5;cursor:not-allowed}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.welcome{text-align:center;padding:40px 20px;color:#64748b}
.welcome h2{font-size:24px;color:#38bdf8;margin-bottom:8px}
.fb-btn{font-size:11px;color:#f59e0b;background:#1e293b;border:1px solid #334155;border-radius:4px;padding:2px 8px;cursor:pointer;margin-top:6px;display:none}
.msg.agent .fb-btn{display:inline-block}
.tool-run{border-left:3px solid #38bdf8;padding:8px 12px;margin:4px 0;background:#0f172a;border-radius:4px;font-size:12px;color:#94a3b8;animation:fadeIn .3s}
.tool-done{border-left:3px solid #22c55e;padding:8px 12px;margin:4px 0;background:#0f172a;border-radius:4px;font-size:12px;color:#94a3b8;animation:fadeIn .3s}

/* marked 渲染样式 */
.msg.agent .bbl table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
.msg.agent .bbl th,.msg.agent .bbl td{border:1px solid #475569;padding:6px 10px;text-align:left}
.msg.agent .bbl th{background:#334155;color:#38bdf8;font-weight:600}
.msg.agent .bbl tr:nth-child(even){background:#1a2332}
.msg.agent .bbl code{background:#0f172a;padding:2px 6px;border-radius:4px;font-size:13px;color:#f59e0b}
.msg.agent .bbl pre{background:#0f172a;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;border:1px solid #334155}
.msg.agent .bbl pre code{background:none;padding:0;color:#e2e8f0}
.msg.agent .bbl blockquote{border-left:3px solid #38bdf8;padding:8px 12px;margin:8px 0;background:#0f172a;border-radius:4px;color:#94a3b8}
.msg.agent .bbl ul,.msg.agent .bbl ol{padding-left:20px;margin:4px 0}
.msg.agent .bbl li{margin:2px 0}
.msg.agent .bbl strong{color:#fbbf24}
.msg.agent .bbl a{color:#38bdf8;text-decoration:underline}

/* 移动端适配 */
@media (max-width: 768px) {
  .chat {
    padding: 12px;
    gap: 12px;
  }
  .msg {
    max-width: 90%;
  }
  .bbl {
    font-size: 13px;
    padding: 10px 12px;
  }
  .input-area {
    padding: 10px 12px;
  }
  .input-area input {
    font-size: 16px;  /* 防止 iOS 自动缩放 */
  }
  .header h1 {
    font-size: 15px;
  }
  .badge {
    font-size: 10px;
    padding: 2px 6px;
  }
  .welcome h2 {
    font-size: 18px;
  }
  .welcome p {
    font-size: 13px;
  }
  .tool-run, .tool-done {
    font-size: 11px;
    padding: 6px 8px;
  }
}

/* 小屏手机 */
@media (max-width: 480px) {
  .msg {
    max-width: 95%;
  }
  .av {
    width: 26px;
    height: 26px;
    font-size: 13px;
  }
  .header {
    padding: 8px 12px;
  }
  .input-area button {
    padding: 10px 16px;
    font-size: 13px;
  }
}</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="header">
  <h1>?? 校园知识问答 Agent</h1>
  <div>
    <a href="/admin" target="_blank">管理后台</a>
    <span class="badge" id="pendingBadge"></span>
    <span class="badge" id="toolsBadge">加载中...</span>
  </div>
</div>
<div class="chat" id="chatContainer">
  <div class="welcome">
    <h2>?? 你好！问我关于学校的问题</h2>
    <p>例如：计算机学院在哪栋楼？宿舍有空调吗？食堂几点开门？</p>
  </div>
</div>
<div class="input-area">
  <input id="input" placeholder="输入你的问题..." />
  <button id="sendBtn">发送</button>
</div>

<script>
var sid = "default";
var processing = false;
var currentMsgEl = null;
var currentBuffer = "";

async function loadTools() {
  try {
    var r = await fetch("/api/tools");
    var d = await r.json();
    document.getElementById("toolsBadge").textContent = "?? " + d.tools.map(function(t){return t.name}).join(", ");
  } catch(e) {}
}

async function loadPendingCount() {
  try {
    var r = await fetch("/api/admin/count");
    var d = await r.json();
    if (d.count > 0) {
      var b = document.getElementById("pendingBadge");
      b.style.display = "inline";
      b.textContent = "待补充 " + d.count;
    }
  } catch(e) {}
}

function escapeHtml(t) {
  var d = document.createElement("div");
  d.textContent = t;
  return d.innerHTML;
}

function addMsg(role, content) {
  var c = document.getElementById("chatContainer");
  var w = c.querySelector(".welcome");
  if (w) w.remove();
  var div = document.createElement("div");
  div.className = "msg " + role;
  var avatar = role === "user" ? "??" : "??";
  var avClass = role === "user" ? "u" : "a";
  var rendered = role === 'agent' && typeof marked !== 'undefined' ? marked.parse(content) : content;
  div.innerHTML = '<div class="av ' + avClass + '">' + avatar + '</div><div class="bbl">' + rendered + '</div>';
  if (role === "agent") {
    var fbBtn = document.createElement("button");
    fbBtn.className = "fb-btn";
    fbBtn.textContent = "没帮到我";
    fbBtn.onclick = function() {
      var userMsgs = document.querySelectorAll(".msg.user .bbl");
      var lastUser = userMsgs[userMsgs.length - 1];
      var question = lastUser ? lastUser.textContent : "";
      fetch("/api/feedback", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({session_id: sid, question: question, answer: currentBuffer})});
      fbBtn.textContent = "已反馈";
      fbBtn.disabled = true;
    };
    div.appendChild(fbBtn);
    currentMsgEl = div.querySelector(".bbl");
    currentBuffer = "";
  }
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
  return div;
}

function appendToken(text) {
  if (!currentMsgEl) return;
  if (currentBuffer === "...") currentBuffer = "";
  currentBuffer += text;
  if (typeof marked !== 'undefined' && currentMsgEl.parentElement && currentMsgEl.parentElement.classList.contains('agent')) { currentMsgEl.innerHTML = marked.parse(currentBuffer); } else { currentMsgEl.textContent = currentBuffer; }
  document.getElementById("chatContainer").scrollTop = document.getElementById("chatContainer").scrollHeight;
}

function addToolRun(tool, input) {
  var c = document.getElementById("chatContainer");
  var d = document.createElement("div");
  d.className = "tool-run";
  d.textContent = "?? 正在查询: " + tool + (input ? " (" + input + ")" : "");
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function addToolDone(output) {
  var c = document.getElementById("chatContainer");
  var d = document.createElement("div");
  d.className = "tool-done";
  d.textContent = "? 查询完成" + (output ? ": " + output.substring(0, 120) : "");
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function send() {
  var inp = document.getElementById("input");
  var btn = document.getElementById("sendBtn");
  var msg = inp.value.trim();
  if (!msg || processing) return;
  inp.value = "";
  processing = true;
  btn.disabled = true;
  addMsg("user", escapeHtml(msg));
  addMsg("agent", "...");
  var url = "/api/chat/stream?session_id=" + encodeURIComponent(sid) + "&message=" + encodeURIComponent(msg);
  var evtSource = new EventSource(url);
  evtSource.onmessage = function(e) {
    try {
      var d = JSON.parse(e.data);
      if (d.type === "token") {
        appendToken(d.content);
      } else if (d.type === "tool_start") {
        addToolRun(d.tool, d.input || "");
      } else if (d.type === "tool_end") {
        addToolDone(d.output || "");
      } else if (d.type === "done") {
        evtSource.close();
        processing = false;
        btn.disabled = false;
        inp.focus();
      } else if (d.type === "error") {
        appendToken("\n[错误: " + d.content + "]");
        evtSource.close();
        processing = false;
        btn.disabled = false;
      }
    } catch(ex) {}
  };
  evtSource.onerror = function() {
    evtSource.close();
    processing = false;
    btn.disabled = false;
  };
}

async function newSession() {
  try {
    var r = await fetch("/api/session/new", {method: "POST"});
    var d = await r.json();
    sid = d.session_id;
    document.getElementById("chatContainer").innerHTML = '<div class="welcome"><h2>新对话已开始</h2><p>会话ID: ' + sid + '</p></div>';
  } catch(e) {
    alert("创建失败");
  }
}

document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") send();
});

loadTools();
loadPendingCount();
</script>
</body>
</html>
